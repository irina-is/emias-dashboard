<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Панель администратора</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-4" style="max-width: 900px;">

    <!-- Шапка -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0">Панель администратора</h4>
        <div>
            <a th:href="${basePath + '/'}" class="btn btn-outline-secondary btn-sm me-2">← Назад</a>
            <form th:action="${basePath + '/logout'}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-danger btn-sm">Выйти</button>
            </form>
        </div>
    </div>

    <!-- Табы -->
    <ul class="nav nav-tabs mb-4" id="adminTabs">
        <li class="nav-item">
            <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-data">
                Загрузка данных
            </button>
        </li>
        <li class="nav-item">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-settings">
                Настройка интерфейса
            </button>
        </li>
        <li class="nav-item">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-logs" onclick="loadLogs()">
                Логи
            </button>
        </li>
    </ul>

    <div class="tab-content">

        <!-- ── Таб 1: Загрузка данных ── -->
        <div class="tab-pane fade show active" id="tab-data">

            <div class="card shadow-sm mb-4">
                <div class="card-body p-4">
                    <h6 class="mb-3">Загрузить отчёт</h6>

                    <div class="mb-3">
                        <label class="form-label">Дата отчёта</label>
                        <input type="date" id="dateInput" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Файл Excel (.xlsx)</label>
                        <input type="file" id="fileInput" accept=".xlsx" class="form-control">
                    </div>

                    <button onclick="uploadFile()" class="btn btn-primary w-100">Загрузить</button>
                    <div id="uploadStatus" class="mt-3" style="display: none;"></div>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h6 class="mb-3">Загруженные файлы</h6>
                    <div id="datesList">
                        <span class="text-muted">Загружаю список...</span>
                    </div>
                </div>
            </div>

        </div>

        <!-- ── Таб 2: Настройка интерфейса ── -->
        <div class="tab-pane fade" id="tab-settings">

            <div class="card shadow-sm">
                <div class="card-body p-4">

                    <h6 class="mb-3">Дашборд</h6>

                    <div class="mb-3">
                        <label class="form-label">Название дашборда</label>
                        <input type="text" id="s-title" class="form-control"
                               th:value="${config.dashboardTitle}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Годовой план (количество скринингов)</label>
                        <input type="number" id="s-plan" class="form-control" min="1"
                               th:value="${config.annualPlan}">
                    </div>

                    <hr class="my-3">
                    <h6 class="mb-3">Плитки главного экрана</h6>

                    <div class="mb-2">
                        <label class="form-label">Плитка 1 (активная)</label>
                        <input type="text" id="s-tile1" class="form-control" th:value="${tile1Name}">
                    </div>
                    <div class="mb-2">
                        <label class="form-label">Плитка 2</label>
                        <input type="text" id="s-tile2" class="form-control" th:value="${tile2Name}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Плитка 3</label>
                        <input type="text" id="s-tile3" class="form-control" th:value="${tile3Name}">
                    </div>

                    <hr class="my-3">
                    <h6 class="mb-3">Диаграммы</h6>

                    <div class="mb-2 d-flex align-items-center gap-3">
                        <div class="form-check form-switch mb-0">
                            <input class="form-check-input" type="checkbox" id="s-monthly-enabled"
                                   th:checked="${config.chartMonthlyEnabled}">
                            <label class="form-check-label" for="s-monthly-enabled">Показывать график по месяцам</label>
                        </div>
                    </div>
                    <div class="mb-3">
                        <input type="text" id="s-monthly-title" class="form-control"
                               placeholder="Название графика по месяцам"
                               th:value="${config.chartMonthlyTitle}">
                    </div>

                    <div class="mb-2 d-flex align-items-center gap-3">
                        <div class="form-check form-switch mb-0">
                            <input class="form-check-input" type="checkbox" id="s-ages-enabled"
                                   th:checked="${config.chartAgesEnabled}">
                            <label class="form-check-label" for="s-ages-enabled">Показывать график по возрасту</label>
                        </div>
                    </div>
                    <div class="mb-3">
                        <input type="text" id="s-ages-title" class="form-control"
                               placeholder="Название графика по возрасту"
                               th:value="${config.chartAgesTitle}">
                    </div>

                    <button onclick="saveSettings()" class="btn btn-success w-100">Сохранить настройки</button>
                    <div id="settingsStatus" class="mt-3" style="display: none;"></div>

                </div>
            </div>

        <!-- ── Таб 3: Логи ── -->
        <div class="tab-pane fade" id="tab-logs">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <div class="d-flex align-items-center gap-3 mb-3 flex-wrap">
                        <h6 class="mb-0">Логи приложения</h6>
                        <select id="logLines" class="form-select form-select-sm" style="width: auto;">
                            <option value="100" selected>100 строк</option>
                            <option value="500">500 строк</option>
                            <option value="1000">1000 строк</option>
                            <option value="5000">5000 строк</option>
                        </select>
                        <button onclick="loadLogs()" class="btn btn-outline-secondary btn-sm">Обновить</button>
                        <div class="form-check form-switch mb-0 ms-auto">
                            <input class="form-check-input" type="checkbox" id="autoRefresh"
                                   onchange="toggleAutoRefresh()">
                            <label class="form-check-label" for="autoRefresh">Авто-обновление (5с)</label>
                        </div>
                    </div>
                    <pre id="logsOutput"
                         style="background:#1e1e1e;color:#d4d4d4;padding:16px;border-radius:6px;
                                font-size:12px;max-height:600px;overflow-y:auto;white-space:pre-wrap;
                                word-break:break-all;">Нажмите "Обновить" для загрузки логов</pre>
                </div>
            </div>
        </div>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    const BASE_PATH = /*[[${basePath}]]*/ '';
</script>
<script>
    // Дата по умолчанию — сегодня
    const today = new Date();
    const yyyy  = today.getFullYear();
    const mm    = String(today.getMonth() + 1).padStart(2, '0');
    const dd    = String(today.getDate()).padStart(2, '0');
    document.getElementById('dateInput').value = yyyy + '-' + mm + '-' + dd;

    loadDates();

    function loadDates() {
        fetch(BASE_PATH + '/api/dates')
            .then(r => r.json())
            .then(dates => {
                const container = document.getElementById('datesList');
                if (dates.length === 0) {
                    container.innerHTML = '<span class="text-muted">Файлов ещё нет</span>';
                    return;
                }
                let html = '<ul class="list-group">';
                for (let i = 0; i < dates.length; i++) {
                    const label = i === 0 ? ' <span class="badge bg-primary ms-2">последний</span>' : '';
                    html += '<li class="list-group-item">' + formatDate(dates[i]) + label + '</li>';
                }
                html += '</ul>';
                container.innerHTML = html;
            })
            .catch(() => {
                document.getElementById('datesList').innerHTML =
                    '<span class="text-danger">Ошибка загрузки списка</span>';
            });
    }

    function uploadFile() {
        const fileInput = document.getElementById('fileInput');
        const dateInput = document.getElementById('dateInput');

        if (!dateInput.value) { showStatus('warning', 'Выберите дату'); return; }
        if (!fileInput.files.length) { showStatus('warning', 'Выберите файл'); return; }

        showStatus('secondary', 'Загружаю...');

        const formData = new FormData();
        formData.append('file', fileInput.files[0]);
        formData.append('date', dateInput.value);

        fetch(BASE_PATH + '/api/upload', { method: 'POST', body: formData })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    showStatus('success', '✓ ' + data.message);
                    fileInput.value = '';
                    loadDates();
                } else {
                    showErrors(data.errors);
                }
            })
            .catch(err => showStatus('danger', '✗ Ошибка: ' + err.message));
    }

    function saveSettings() {
        const plan = parseInt(document.getElementById('s-plan').value);
        if (!plan || plan <= 0) {
            showSettingsStatus('warning', 'Годовой план должен быть положительным числом');
            return;
        }
        const payload = {
            'dashboard.title':       document.getElementById('s-title').value.trim(),
            'screening.annual-plan': String(plan),
            'chart.monthly.title':   document.getElementById('s-monthly-title').value.trim(),
            'chart.monthly.enabled': String(document.getElementById('s-monthly-enabled').checked),
            'chart.ages.title':      document.getElementById('s-ages-title').value.trim(),
            'chart.ages.enabled':    String(document.getElementById('s-ages-enabled').checked),
            'tile.1.name':           document.getElementById('s-tile1').value.trim(),
            'tile.2.name':           document.getElementById('s-tile2').value.trim(),
            'tile.3.name':           document.getElementById('s-tile3').value.trim()
        };
        fetch(BASE_PATH + '/api/settings', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(r => { if (!r.ok) return r.text().then(t => { throw new Error(t); }); return r.text(); })
        .then(msg => showSettingsStatus('success', '✓ ' + msg))
        .catch(err => showSettingsStatus('danger', '✗ ' + err.message));
    }

    function formatDate(dateStr) {
        const months = ['января','февраля','марта','апреля','мая','июня',
                        'июля','августа','сентября','октября','ноября','декабря'];
        const parts = dateStr.split('-');
        return parts[2] + ' ' + months[parseInt(parts[1]) - 1] + ' ' + parts[0];
    }

    function showStatus(type, message) {
        const el = document.getElementById('uploadStatus');
        el.style.display = 'block';
        el.className = 'alert alert-' + type;
        el.textContent = message;
    }

    function showErrors(errors) {
        const el = document.getElementById('uploadStatus');
        el.style.display = 'block';
        el.className = 'alert alert-danger';
        el.innerHTML = '<strong>Данные не загружены. Исправьте ошибки в файле:</strong>'
            + '<ul class="mb-0 mt-2">'
            + errors.map(e => '<li>' + e.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</li>').join('')
            + '</ul>';
    }

    function showSettingsStatus(type, message) {
        const el = document.getElementById('settingsStatus');
        el.style.display = 'block';
        el.className = 'alert alert-' + type;
        el.textContent = message;
    }

    let autoRefreshTimer = null;

    function loadLogs() {
        const lines = document.getElementById('logLines').value;
        const output = document.getElementById('logsOutput');
        output.textContent = 'Загружаю...';
        fetch(BASE_PATH + '/api/logs?lines=' + lines)
            .then(r => r.text())
            .then(text => {
                output.textContent = text;
                output.scrollTop = output.scrollHeight;
            })
            .catch(() => { output.textContent = 'Ошибка загрузки логов'; });
    }

    function toggleAutoRefresh() {
        if (document.getElementById('autoRefresh').checked) {
            loadLogs();
            autoRefreshTimer = setInterval(loadLogs, 5000);
        } else {
            clearInterval(autoRefreshTimer);
            autoRefreshTimer = null;
        }
    }

    document.getElementById('logLines').addEventListener('change', function() {
        if (document.getElementById('logsOutput').textContent !== 'Нажмите "Обновить" для загрузки логов') {
            loadLogs();
        }
    });
</script>

</body>
</html>
