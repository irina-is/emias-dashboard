server.port=8081
app.base-path=/spec

spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

screening.annual-plan=430270

app.admin.username=admin
app.admin.password=admin

report.upload.dir=./uploads

spring.datasource.url=jdbc:h2:file:./data/emias_db;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update

spring.jpa.properties.hibernate.jdbc.batch_size=500
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

logging.file.name=./logs/app.log
app.upload-log.file=./logs/upload.log
logging.level.com.emias.dashboard=INFO
