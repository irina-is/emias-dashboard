server.port=8080

# Максимальный размер загружаемого файла
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Годовой план скрининга ХВГС (количество исследований)
screening.annual-plan=430270

# Учётные данные администратора (ОБЯЗАТЕЛЬНО сменить в продакшн через application-prod.properties)
app.admin.username=admin
app.admin.password=admin

# Папка где хранятся загруженные файлы-архивы (Excel)
# Относительный путь — папка uploads/ создаётся рядом с запущенным jar-файлом
# Для Windows можно указать абсолютный путь: report.upload.dir=C:/Users/Stepler/emias-uploads
report.upload.dir=./uploads

# База данных H2 — файл ./data/emias_db.mv.db рядом с проектом
spring.datasource.url=jdbc:h2:file:./data/emias_db;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Автоматически создаёт/обновляет таблицы при запуске
spring.jpa.hibernate.ddl-auto=update

# Батч-вставка: Hibernate группирует INSERT-ы по 500 записей за один раз
spring.jpa.properties.hibernate.jdbc.batch_size=500
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Веб-консоль H2: открывается в браузере на http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Логирование в файл
logging.file.name=./logs/app.log
app.upload-log.file=./logs/upload.log
# DEBUG вызывает 100к log.debug() вызовов при загрузке большого файла — используем INFO
logging.level.com.emias.dashboard=INFO
